<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fijian Night Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "fire-orange": "#e8722a",
                        "torch-yellow": "#f5b731",
                        "stone-dark": "#0f0f0f",
                        "input-bg": "#1a1a1a",
                        "sand": "#d4b483",
                        "ocean": "#1a8cbb",
                        "jungle": "#1db954",
                    },
                    fontFamily: {
                        "display": ["Bebas Neue", "cursive"],
                        "sans": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --fire-orange: #e8722a;
            --torch-yellow: #f5b731;
            --sand: #d4b483;
        }
        .tapa-texture {
            background-color: #0f0f0f;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 0 L10 100 M90 0 L90 100 M0 10 L100 10 M0 90 L100 90 M50 0 L50 100 M0 50 L100 50' stroke='%23ffffff' stroke-width='0.5' fill='none' opacity='0.03'/%3E%3Cpath d='M0 0 L10 10 M90 90 L100 100 M100 0 L90 10 M0 100 L10 90' stroke='%23ffffff' stroke-width='0.5' fill='none' opacity='0.03'/%3E%3C/svg%3E");
            background-repeat: repeat;
        }
        .torch-glow {
            filter: drop-shadow(0 0 15px rgba(232, 114, 42, 0.6));
        }
        .text-fire-shadow {
            text-shadow: 0 4px 12px rgba(232, 114, 42, 0.4);
        }
        .palm-leaf-left {
            position: absolute;
            left: -10%;
            top: -5%;
            width: 60%;
            height: 40%;
            background: radial-gradient(circle at center, #1a8cbb22 0%, transparent 70%);
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10,90 Q30,10 90,10 Q50,40 10,90' fill='black'/%3E%3C/svg%3E");
            mask-size: contain;
            mask-repeat: no-repeat;
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }
        .palm-leaf-right {
            position: absolute;
            right: -15%;
            bottom: -5%;
            width: 70%;
            height: 50%;
            background: radial-gradient(circle at center, #1db95422 0%, transparent 70%);
            mask-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M90,10 Q70,90 10,90 Q50,60 90,10' fill='black'/%3E%3C/svg%3E");
            mask-size: contain;
            mask-repeat: no-repeat;
            opacity: 0.12;
            pointer-events: none;
            z-index: 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-stone-dark font-sans text-slate-100 min-h-screen antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-hidden tapa-texture">
<div class="palm-leaf-left"></div>
<div class="palm-leaf-right"></div>
<div class="flex items-center p-6 justify-between z-20">
<div class="text-slate-400 flex size-10 items-center justify-center cursor-pointer hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</div>
</div>
<div class="flex flex-col flex-1 items-center justify-center px-8 z-20 pb-24">
<div class="mb-8 torch-glow">
<div class="relative flex items-center justify-center">
<span class="material-symbols-outlined text-6xl text-fire-orange" style="font-variation-settings: 'FILL' 1, 'wght' 400;">
                        mode_fan
                    </span>
<div class="absolute -top-4 text-torch-yellow blur-[1px]">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
</div>
</div>
<div class="text-center mb-10">
<h1 class="text-6xl font-display tracking-tight text-fire-orange text-fire-shadow leading-[0.85]">
                    SURVIVOR
                </h1>
<h1 class="text-8xl font-display tracking-tighter text-torch-yellow text-fire-shadow leading-[0.85] mt-1">
                    50
                </h1>
<p class="text-[10px] font-bold tracking-[0.4em] text-sand uppercase mt-6 opacity-80">
                    WATCH PARTY HQ
                </p>
</div>
<div class="w-full max-w-[320px] space-y-6">
<div class="space-y-2">
<label class="block text-sand/60 text-[10px] font-bold uppercase tracking-wider px-1">Access Email</label>
<input class="w-full bg-input-bg border border-white/5 focus:border-fire-orange/50 focus:ring-1 focus:ring-fire-orange/20 rounded-xl h-14 px-5 text-slate-100 placeholder:text-slate-700 transition-all outline-none" placeholder="Enter your email" type="email"/>
</div>
<div class="pt-2">
<button class="w-full h-14 rounded-2xl bg-gradient-to-br from-fire-orange to-[#b34d1a] text-white text-base font-bold shadow-xl shadow-fire-orange/10 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 1;">magic_button</span>
<span>Send Magic Link</span>
</button>
<p class="text-center text-slate-500 text-xs mt-8 leading-relaxed">
                        Enter your email and we'll send you <br/>a magic link to the island <span class="text-torch-yellow/60">✨</span>
</p>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 right-0 h-48 bg-gradient-to-t from-stone-dark via-stone-dark/40 to-transparent pointer-events-none z-10"></div>
</div>

</body></html>
